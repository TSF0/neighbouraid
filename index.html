<!DOCTYPE html>
<html>
<head>
  <title>NeighbourAid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>NeighbourAid</h1>
  <p>Smart Community Guidance Platform</p>
</header>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>Login / Register</h2>
    <input type="text" id="userInput" placeholder="Email or Phone">
    <button onclick="sendOTP()">Send OTP</button>

    <div id="otpSection" style="display:none;">
      <input type="text" id="otpInput" placeholder="Enter OTP">
      <button onclick="verifyOTP()">Verify</button>
    </div>
  </div>

  <!-- APP -->
  <div id="mainApp" style="display:none;">

    <div class="card">
      <h3>Welcome, <span id="usernameDisplay"></span></h3>

      <input type="text" id="username" placeholder="Your Name">

      <select id="category">
        <option>Banking Guidance</option>
        <option>Medical Information</option>
        <option>Digital Assistance</option>
        <option>General Guidance</option>
      </select>

      <textarea id="question" placeholder="Ask your question"></textarea>

      <button onclick="postQuestion()">Post Question</button>
    </div>

    <div class="card">
      <h3>Community Feed</h3>
      <div id="questionsList"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
